<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neural Scanner Pro (Fixed CDN)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b0f1a;
            --card: #161e2d;
            --border: rgba(255, 255, 255, 0.15);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --err: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        
        .menu-card { background: var(--card); padding: 30px; border-radius: 28px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .loader-wrap { margin: 20px 0; }
        .progress-container { width: 100%; height: 8px; background: #242f42; border-radius: 10px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.4s ease; }
        
        #statusText { font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-top: 10px; display: block; line-height: 1.4; }

        .btn { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: var(--primary); color: white; font-size: 1rem; transition: all 0.3s; }
        .btn:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; opacity: 0.6; }
        
        .results-stack { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; text-align: left; }
        .result-card { background: #0f172a; padding: 16px; border-radius: 20px; border: 1px solid var(--border); }
        .result-card span { font-size: 0.65rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 10px; }
        
        .canvas-preview { width: 100%; height: 60px; background: #000; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1e293b; }
        canvas { width: 100%; height: 100%; object-fit: contain; }

        .app-text { 
            font-family: 'Consolas', monospace; font-size: 1.1rem; color: #fff; background: #000; 
            padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--primary);
        }
        #mainUpload { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="menu-card">
            <h2>Neural Scanner</h2>
            <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 10px;">Deep Learning OCR Pipeline</p>
            
            <div class="loader-wrap">
                <div class="progress-container" id="pContainer"><div class="progress-bar" id="pBar"></div></div>
                <span id="statusText">Initializing AI...</span>
            </div>

            <button class="btn" id="uploadBtn" disabled onclick="document.getElementById('mainUpload').click()">Please Wait...</button>
            <input type="file" id="mainUpload" accept="image/*">

            <div id="resultsArea" style="display: none;">
                <div class="results-stack">
                    <div class="result-card"><span>ID Field 1</span><div class="canvas-preview"><canvas id="appCanvasCard1"></canvas></div><div class="app-text" id="appTextCard1">---</div></div>
                    <div class="result-card"><span>ID Field 2</span><div class="canvas-preview"><canvas id="appCanvasCard2"></canvas></div><div class="app-text" id="appTextCard2">---</div></div>
                    <div class="result-card"><span>Security Pin</span><div class="canvas-preview"><canvas id="appCanvasCode"></canvas></div><div class="app-text" id="appTextCode">---</div></div>
                    <div class="result-card"><span>Valid Date</span><div class="canvas-preview"><canvas id="appCanvasDate"></canvas></div><div class="app-text" id="appTextDate">---</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // High-availability Model Links (Try Mindee CDN first, then raw GitHub fallback)
        const MODELS = [
            'https://demo-doctr-tensorflowjs.mindee.com/models/crnn_mobilenet_v3_small/model.json',
            'https://raw.githubusercontent.com/mindee/doctr-tfjs-demo/master/public/models/crnn_mobilenet_v3_small/model.json'
        ];

        const VOCAB = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ!\"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~ ";
        const appRegions = [
            { id: 'Card1', left: 29.6, right: 39.2, top: 49.6, bottom: 53.2 },
            { id: 'Card2', left: 60.1, right: 69.6, top: 49.6, bottom: 53.2 },
            { id: 'Code', left: 52.0, right: 63.8, top: 66.2, bottom: 72.2 },
            { id: 'Date', left: 46.4, right: 61.9, top: 74.8, bottom: 79.3 }
        ];

        let ocrModel = null;

        async function initNeuralEngine() {
            const status = document.getElementById('statusText');
            const pBar = document.getElementById('pBar');
            document.getElementById('pContainer').style.display = 'block';

            for (let url of MODELS) {
                try {
                    status.innerText = "Connecting to Neural Cluster...";
                    pBar.style.width = '40%';
                    
                    // Attempt to load. GraphModel is used for frozen docTR models
                    ocrModel = await tf.loadGraphModel(url);
                    
                    pBar.style.width = '100%';
                    status.innerText = "Neural Engine Online";
                    status.style.color = '#10b981';
                    
                    const btn = document.getElementById('uploadBtn');
                    btn.disabled = false;
                    btn.innerText = "Upload Image";
                    
                    setTimeout(() => { document.getElementById('pContainer').style.display = 'none'; }, 1000);
                    return; // Success, exit loop
                } catch (e) {
                    console.warn(`Link failed: ${url}`, e);
                    status.innerText = "Retrying connection...";
                }
            }
            
            status.innerText = "Fatal: All CDN nodes unreachable.\nCheck your internet connection.";
            status.style.color = 'var(--err)';
        }

        window.onload = initNeuralEngine;

        document.getElementById('mainUpload').onchange = async e => {
            const file = e.target.files[0];
            if (!file || !ocrModel) return;

            const img = await loadImage(file);
            document.getElementById('resultsArea').style.display = 'block';
            document.getElementById('statusText').innerText = "Analyzing Tensors...";

            for (const region of appRegions) {
                const canvas = document.getElementById(`appCanvas${region.id}`);
                const textDiv = document.getElementById(`appText${region.id}`);
                textDiv.innerText = "...";

                const x = (region.left / 100) * img.width;
                const y = (region.top / 100) * img.height;
                const w = ((region.right - region.left) / 100) * img.width;
                const h = ((region.bottom - region.top) / 100) * img.height;

                canvas.width = w * 2; canvas.height = h * 2;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, x, y, w, h, 0, 0, canvas.width, canvas.height);

                try {
                    const result = await tf.tidy(() => {
                        const tensor = tf.browser.fromPixels(canvas)
                            .resizeBilinear([32, 128])
                            .mean(2) // Grayscale
                            .expandDims(2)
                            .toFloat()
                            .div(255.0)
                            .expandDims(0);
                        
                        const pred = ocrModel.predict(tensor);
                        return decode(pred);
                    });
                    textDiv.innerText = result || "???";
                } catch (err) {
                    textDiv.innerText = "OCR Error";
                }
            }
            document.getElementById('statusText').innerText = "Processing Done";
        };

        function decode(prediction) {
            const data = prediction.dataSync();
            const [batch, seq, classes] = prediction.shape;
            let str = "";
            let last = -1;

            for (let i = 0; i < seq; i++) {
                let max = 0, idx = -1;
                for (let c = 0; c < classes; c++) {
                    const val = data[i * classes + c];
                    if (val > max) { max = val; idx = c; }
                }
                if (idx !== classes - 1 && idx !== last) {
                    str += VOCAB[idx] || "";
                }
                last = idx;
            }
            return str;
        }

        function loadImage(file) {
            return new Promise(res => {
                const r = new FileReader();
                r.onload = e => {
                    const i = new Image();
                    i.onload = () => res(i);
                    i.src = e.target.result;
                };
                r.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
